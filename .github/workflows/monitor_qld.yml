name: QBCC Queensland Monitor

on:
  # Allows the "Trigger All" logic to work
  repository_dispatch:
    types: [trigger-all-repos]

  # Standard daily schedule (e.g., 7:30 AM Sydney/Brisbane time)
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual trigger button for your iPhone Shortcut
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml
      
      - name: Run QBCC Monitor
        run: python monitor_qld.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
