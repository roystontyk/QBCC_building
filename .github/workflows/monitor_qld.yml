name: QBCC Queensland Monitor

on:
  # Allows the "Trigger All" logic to work
  repository_dispatch:
    types: [trigger-all-repos]

  # MATCHED: Runs daily at 8:30 AM Melbourne/Sydney Time (AEDT)
  # 21:30 UTC = 8:30 AM AEDT / 7:30 AM AEST (QLD)
  schedule:
    - cron: '30 21 * * *' 
    
  # Manual trigger button for your iPhone Shortcut
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        # Added lxml to match your other scrapers for consistency
        run: pip install requests beautifulsoup4 lxml
      
      - name: Run QBCC Monitor
        run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Standardizes the environment to Brisbane time
          TZ: 'Australia/Brisbane'
